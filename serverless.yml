service: ternkonnect-backend

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-north-1
  stage: ${opt:stage, 'prod'}
  environment:
    NODE_ENV: ${env:NODE_ENV, 'production'}
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    AWS_S3_BUCKET_NAME: ${env:AWS_S3_BUCKET_NAME}
    RESEND_API_KEY: ${env:RESEND_API_KEY}
    FRONTEND_URL: ${env:FRONTEND_URL}
    EMAIL_FROM: ${env:EMAIL_FROM}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${env:AWS_S3_BUCKET_NAME}
            - arn:aws:s3:::${env:AWS_S3_BUCKET_NAME}/*

functions:
  api:
    handler: lambda.handler
    events:
      - httpApi:
          path: '*'
          method: '*'

package:
  # Keep Lambda payload footprint small by excluding developer/CI tools
  patterns:
    - '!.git/**'
    - '!.github/**'
    - '!.vscode/**'
    - '!*.md'

plugins:
  - serverless-dotenv-plugin
